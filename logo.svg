<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 50" fill="none">
  <defs>
    <linearGradient id="pinGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4338CA"/>
      <stop offset="50%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
    <linearGradient id="linesGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4338CA"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <linearGradient id="geoGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>
  <!-- Speed lines -->
  <rect x="2" y="14" width="16" height="3" rx="1.5" fill="url(#linesGrad)" opacity="0.7"/>
  <rect x="5" y="22" width="14" height="3" rx="1.5" fill="url(#linesGrad)" opacity="0.85"/>
  <rect x="2" y="30" width="16" height="3" rx="1.5" fill="url(#linesGrad)" opacity="0.7"/>
  <!-- Location pin -->
  <path d="M36 8C29.4 8 24 13.1 24 19.5C24 28.5 36 42 36 42C36 42 48 28.5 48 19.5C48 13.1 42.6 8 36 8Z" fill="url(#pinGrad)"/>
  <!-- Inner circle (eye) -->
  <circle cx="36" cy="19.5" r="5.5" fill="white" opacity="0.95"/>
  <circle cx="36" cy="19.5" r="2.8" fill="#1E1B4B"/>
  <!-- Text: Fast -->
  <text x="56" y="36" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="30" fill="#1E1B4B">Fast</text>
  <!-- Text: GEO -->
  <text x="130" y="36" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="30" fill="url(#geoGrad)">GEO</text>
</svg>
