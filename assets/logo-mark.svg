<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="FastGEO mark">
  <defs>
    <linearGradient id="fg-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E1B4B"/>
      <stop offset=".55" stop-color="#4338CA"/>
      <stop offset="1" stop-color="#0D9488"/>
    </linearGradient>
  </defs>
  <!-- rounded gradient tile -->
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#fg-grad)"/>
